name: Build, Test & Deploy to ECS

on:
  push:
    branches:
      - main          # change to your branch name if different
      - develop

env:
  AWS_REGION:         us-east-1                   # change to your region
  ECR_REPOSITORY:     large-file-sorter           # ECR repo name
  ECS_CLUSTER:        large-file-sorter-cluster   # ECS cluster name
  ECS_SERVICE:        large-file-sorter-service   # ECS service name (optional — only if you run a persistent service)
  TASK_DEFINITION:    large-file-sorter-task      # ECS task definition family name
  CONTAINER_NAME:     large-file-sorter           # container name inside the task definition

jobs:
  # ── 1. Run tests ──────────────────────────────────────────────────────────────
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore LargeFilesSorter.sln

      - name: Build
        run: dotnet build LargeFilesSorter.sln --no-restore -c Release

      - name: Test
        run: dotnet test LargeFileSort.Tests/LargeFileSort.Tests.csproj --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/results.trx'

  # ── 2. Build Docker image & push to ECR ────────────────────────────────────
  deploy:
    name: Build image & deploy to ECS
    runs-on: ubuntu-latest
    needs: test   # only runs if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Update ECS task definition with the new image ──
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION }} \
            --query taskDefinition \
            > task-def.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-def.json
          container-name:   ${{ env.CONTAINER_NAME }}
          image:            ${{ steps.build-image.outputs.image }}

      - name: Register updated task definition
        id: register-task-def
        run: |
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.task-def.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT

      # ── Option A: update a long-running ECS service (uncomment if you use one) ──
      # - name: Deploy to ECS service
      #   uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      #   with:
      #     task-definition: ${{ steps.task-def.outputs.task-definition }}
      #     service:         ${{ env.ECS_SERVICE }}
      #     cluster:         ${{ env.ECS_CLUSTER }}
      #     wait-for-service-stability: true

      # ── Option B: run as a one-off Fargate task (typical for a CLI sorter) ──
      - name: Run ECS Fargate task
        run: |
          aws ecs run-task \
            --cluster   ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ steps.register-task-def.outputs.task_def_arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_ID }}],securityGroups=[${{ secrets.SECURITY_GROUP_ID }}],assignPublicIp=ENABLED}" \
            --overrides '{
              "containerOverrides": [{
                "name": "${{ env.CONTAINER_NAME }}",
                "command": [
                  "/data/input.txt",
                  "/data/sorted.txt",
                  "--chunk-size-mb",    "512",
                  "--merge-fan-in",     "32",
                  "--temp-dir",         "/tmp/sort-temp"
                ]
              }]
            }'

