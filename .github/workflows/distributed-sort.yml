name: Distributed Sort (Map-Reduce)

on:
  workflow_dispatch:
    inputs:
      generate_input:
        description: 'Generate a new input file? Set file_size_mb below. Leave false to reuse existing s3://…/input/input.txt'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      file_size_mb:
        description: 'Input file size in MB to generate (used only when generate_input=true, e.g. 102400 = 100 GB)'
        required: false
        default: '102400'
      worker_count:
        description: 'Number of parallel map workers (each uses 2 vCPUs; stay within your Fargate quota)'
        required: false
        default: '6'
      chunk_size_mb:
        description: 'Chunk size per worker in MB'
        required: false
        default: '512'
      merge_fan_in:
        description: 'Merge fan-in per worker'
        required: false
        default: '32'
      run_id:
        description: 'Unique run tag for S3 parts prefix (leave blank to auto-generate)'
        required: false
        default: ''

env:
  AWS_REGION:          us-east-1
  ECS_CLUSTER:         large-file-sorter-cluster
  TASK_FAMILY:         large-file-sorter-distributed
  CONTAINER_NAME:      large-file-sorter
  ECR_REPOSITORY:      large-file-sorter
  ECR_REPOSITORY_TEST: large-file-sorter-test
  S3_BUCKET:           large-file-sorter-test-quantumhawk
  S3_INPUT_KEY:        input/input.txt

jobs:
  distributed-sort:
    name: Distributed map-reduce sort
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push sorter image ─────────────────────────────────────────
      - name: Build & push sorter image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          aws ecr create-repository --repository-name $ECR_REPOSITORY 2>/dev/null || true
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Build & push test image (needed for generate step) ───────────────
      - name: Build & push test image
        if: ${{ inputs.generate_input == 'true' }}
        id: build-test-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          aws ecr create-repository --repository-name $ECR_REPOSITORY_TEST 2>/dev/null || true
          docker build -f Dockerfile.awstest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_TEST:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_TEST:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_TEST:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_TEST:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_TEST:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Generate & upload input file via ECS (generate_input=true only) ──
      - name: Generate & upload input file
        if: ${{ inputs.generate_input == 'true' }}
        run: |
          FILE_SIZE_MB=${{ inputs.file_size_mb }}
          TEST_IMAGE="${{ steps.build-test-image.outputs.image }}"

          # Storage for generator: file_size_mb + 10 GiB overhead, min 21 GiB
          GEN_STORAGE_MB=$((FILE_SIZE_MB + 10240))
          GEN_STORAGE_GIB=$((GEN_STORAGE_MB / 1024 + 1))
          [ "$GEN_STORAGE_GIB" -lt 21  ] && GEN_STORAGE_GIB=21
          [ "$GEN_STORAGE_GIB" -gt 200 ] && GEN_STORAGE_GIB=200

          echo "Registering generator task (${FILE_SIZE_MB} MB, storage=${GEN_STORAGE_GIB} GiB)..."
          GEN_TASK_DEF=$(aws ecs register-task-definition \
            --family large-file-sorter-generate \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu 4096 --memory 16384 \
            --ephemeral-storage sizeInGiB=$GEN_STORAGE_GIB \
            --execution-role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole \
            --task-role-arn      arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskRole \
            --container-definitions "[{
              \"name\": \"large-file-sorter-test\",
              \"image\": \"$TEST_IMAGE\",
              \"essential\": true,
              \"environment\": [
                {\"name\": \"S3_BUCKET\",    \"value\": \"${{ env.S3_BUCKET }}\"},
                {\"name\": \"FILE_SIZE_MB\", \"value\": \"$FILE_SIZE_MB\"},
                {\"name\": \"SKIP_SORT\",    \"value\": \"true\"}
              ],
              \"logConfiguration\": {
                \"logDriver\": \"awslogs\",
                \"options\": {
                  \"awslogs-group\": \"/ecs/large-file-sorter-test\",
                  \"awslogs-region\": \"${{ env.AWS_REGION }}\",
                  \"awslogs-stream-prefix\": \"gen\",
                  \"awslogs-create-group\": \"true\"
                }
              }
            }]" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "Launching generator task..."
          GEN_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition $GEN_TASK_DEF \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_ID }}],securityGroups=[${{ secrets.SECURITY_GROUP_ID }}],assignPublicIp=ENABLED}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Generator task ARN: $GEN_ARN"

          echo "Waiting for generator to finish (may take a while for large files)..."
          MAX_WAIT_SECS=10800; POLL_INTERVAL=30; ELAPSED=0
          while true; do
            STATUS=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks "$GEN_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            echo "  [${ELAPSED}s] $STATUS"
            [ "$STATUS" = "STOPPED" ] && break
            [ "$ELAPSED" -ge "$MAX_WAIT_SECS" ] && echo "Timeout!" && exit 1
            sleep $POLL_INTERVAL; ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          EXIT_CODE=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks "$GEN_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Generator exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            TASK_ID=$(echo "$GEN_ARN" | awk -F/ '{print $NF}')
            echo "--- Generator logs ---"
            aws logs get-log-events \
              --log-group-name /ecs/large-file-sorter-test \
              --log-stream-name "gen/large-file-sorter-test/$TASK_ID" \
              --query 'events[*].message' --output text 2>/dev/null || echo "(logs unavailable)"
            exit 1
          fi
          echo "Input file generated and uploaded to s3://${{ env.S3_BUCKET }}/${{ env.S3_INPUT_KEY }}"

      # ── Generate a unique run prefix for this distributed run ────────────
      - name: Set run prefix
        id: run-prefix
        run: |
          RUN_ID="${{ inputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID="run-$(date +%Y%m%d-%H%M%S)-${{ github.run_number }}"
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "parts_prefix=distributed/$RUN_ID/parts/" >> $GITHUB_OUTPUT
          echo "output_key=distributed/$RUN_ID/output/sorted.txt" >> $GITHUB_OUTPUT
          echo "Run ID: $RUN_ID"

      # ── Query S3 for actual input file size → used for storage calculation ──
      - name: Probe S3 input file size
        id: probe-s3
        run: |
          echo "Probing s3://${{ env.S3_BUCKET }}/${{ env.S3_INPUT_KEY }} ..."
          BYTES=$(aws s3api head-object \
            --bucket ${{ env.S3_BUCKET }} \
            --key    ${{ env.S3_INPUT_KEY }} \
            --query  'ContentLength' \
            --output text 2>/dev/null || echo "0")

          if [ "$BYTES" = "0" ] || [ -z "$BYTES" ]; then
            echo "ERROR: s3://${{ env.S3_BUCKET }}/${{ env.S3_INPUT_KEY }} not found."
            echo "Run this workflow with generate_input=true first, or run aws-integration-test to create the file."
            exit 1
          fi

          SIZE_MB=$((BYTES / 1048576))
          echo "Input file: ${SIZE_MB} MB (${BYTES} bytes)"
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT

      # ── Register task definition once (reused by all workers) ───────────
      - name: Register ECS task definition
        id: register-task
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          # Ephemeral storage per worker: each worker downloads fileSize/workerCount
          # text, writes binary chunks (~85%), writes merged binary (~85%).
          # Peak ≈ 2.5× per-worker slice.  Add 10 GiB OS/image overhead, min 21 GiB.
          FILE_SIZE_MB=${{ steps.probe-s3.outputs.size_mb }}
          WORKER_COUNT=${{ inputs.worker_count }}

          SLICE_MB=$((FILE_SIZE_MB / WORKER_COUNT))
          STORAGE_MB=$((SLICE_MB * 25 / 10 + 10240))  # 2.5× slice + 10 GB
          STORAGE_GIB=$((STORAGE_MB / 1024 + 1))

          # Clamp to Fargate limits [21, 200]
          [ "$STORAGE_GIB" -lt 21 ]  && STORAGE_GIB=21
          [ "$STORAGE_GIB" -gt 200 ] && STORAGE_GIB=200

          echo "Ephemeral storage per worker: ${STORAGE_GIB} GiB"
          echo "  Input: ${FILE_SIZE_MB} MB  |  Workers: ${WORKER_COUNT}  |  Slice: ${SLICE_MB} MB"

          # Map/reduce workers are I/O-bound: 2 vCPUs + 8 GB RAM is sufficient.
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --family ${{ env.TASK_FAMILY }} \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu 2048 --memory 8192 \
            --ephemeral-storage sizeInGiB=$STORAGE_GIB \
            --execution-role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole \
            --task-role-arn      arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskRole \
            --container-definitions "[{
              \"name\": \"${{ env.CONTAINER_NAME }}\",
              \"image\": \"$IMAGE\",
              \"essential\": true,
              \"logConfiguration\": {
                \"logDriver\": \"awslogs\",
                \"options\": {
                  \"awslogs-group\": \"/ecs/large-file-sorter\",
                  \"awslogs-region\": \"${{ env.AWS_REGION }}\",
                  \"awslogs-stream-prefix\": \"dist\",
                  \"awslogs-create-group\": \"true\"
                }
              }
            }]" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      # ── Register REDUCE task definition (needs all parts + output on disk) ─
      - name: Register reduce task definition
        id: register-reduce-task
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          FILE_SIZE_MB=${{ steps.probe-s3.outputs.size_mb }}

          # Reduce worker holds: all binary parts (~85% of input) + text output (~100% of input)
          # Total ≈ 1.85× input size + 10 GiB overhead. Clamp to Fargate max 200 GiB.
          REDUCE_STORAGE_MB=$((FILE_SIZE_MB * 185 / 100 + 10240))
          REDUCE_STORAGE_GIB=$((REDUCE_STORAGE_MB / 1024 + 1))
          [ "$REDUCE_STORAGE_GIB" -lt 21  ] && REDUCE_STORAGE_GIB=21
          [ "$REDUCE_STORAGE_GIB" -gt 200 ] && REDUCE_STORAGE_GIB=200

          echo "Reduce worker storage: ${REDUCE_STORAGE_GIB} GiB  (input=${FILE_SIZE_MB} MB)"

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --family ${{ env.TASK_FAMILY }}-reduce \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu 4096 --memory 16384 \
            --ephemeral-storage sizeInGiB=$REDUCE_STORAGE_GIB \
            --execution-role-arn arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole \
            --task-role-arn      arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskRole \
            --container-definitions "[{
              \"name\": \"${{ env.CONTAINER_NAME }}\",
              \"image\": \"$IMAGE\",
              \"essential\": true,
              \"logConfiguration\": {
                \"logDriver\": \"awslogs\",
                \"options\": {
                  \"awslogs-group\": \"/ecs/large-file-sorter\",
                  \"awslogs-region\": \"${{ env.AWS_REGION }}\",
                  \"awslogs-stream-prefix\": \"dist\",
                  \"awslogs-create-group\": \"true\"
                }
              }
            }]" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      # ── Pre-flight: check Fargate vCPU quota ────────────────────────────
      - name: Check Fargate vCPU quota
        run: |
          WORKER_COUNT=${{ inputs.worker_count }}
          VCPUS_PER_TASK=2
          VCPUS_NEEDED=$((WORKER_COUNT * VCPUS_PER_TASK))

          QUOTA=$(aws service-quotas get-service-quota \
            --service-code fargate \
            --quota-code L-3032A538 \
            --query 'Quota.Value' \
            --output text 2>/dev/null || echo "0")

          QUOTA_INT=${QUOTA%.*}

          echo "Fargate vCPU quota : ${QUOTA_INT} vCPUs"
          echo "Workers requested  : ${WORKER_COUNT} × ${VCPUS_PER_TASK} vCPUs = ${VCPUS_NEEDED} vCPUs"

          if [ "$QUOTA_INT" -gt 0 ] && [ "$VCPUS_NEEDED" -gt "$QUOTA_INT" ]; then
            echo ""
            echo "ERROR: Not enough Fargate vCPU quota."
            echo "  Need ${VCPUS_NEEDED}, have ${QUOTA_INT}."
            echo "  Options:"
            echo "    1. Reduce worker_count to $((QUOTA_INT / VCPUS_PER_TASK)) or fewer"
            echo "    2. Request a quota increase:"
            echo "       AWS Console → Service Quotas → AWS Fargate → 'Fargate On-Demand vCPU resource count'"
            exit 1
          fi

          echo "Quota check passed."

      # ── Launch all map workers in parallel ───────────────────────────────
      - name: Launch map workers
        id: launch-maps
        run: |
          WORKER_COUNT=${{ inputs.worker_count }}
          TASK_DEF=${{ steps.register-task.outputs.task_def_arn }}
          PARTS_PREFIX="${{ steps.run-prefix.outputs.parts_prefix }}"
          ARNS=""

          for i in $(seq 0 $((WORKER_COUNT - 1))); do
            echo "Launching map worker $i / $WORKER_COUNT ..."

            ARN=""
            for attempt in 1 2 3; do
              RESPONSE=$(aws ecs run-task \
                --cluster ${{ env.ECS_CLUSTER }} \
                --task-definition $TASK_DEF \
                --launch-type FARGATE \
                --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_ID }}],securityGroups=[${{ secrets.SECURITY_GROUP_ID }}],assignPublicIp=ENABLED}" \
                --overrides "{
                  \"containerOverrides\": [{
                    \"name\": \"${{ env.CONTAINER_NAME }}\",
                    \"command\": [
                      \"--mode\",            \"map\",
                      \"--s3-bucket\",       \"${{ env.S3_BUCKET }}\",
                      \"--s3-input-key\",    \"${{ env.S3_INPUT_KEY }}\",
                      \"--s3-parts-prefix\", \"$PARTS_PREFIX\",
                      \"--worker-id\",       \"$i\",
                      \"--worker-count\",    \"$WORKER_COUNT\",
                      \"--chunk-size-mb\",   \"${{ inputs.chunk_size_mb }}\",
                      \"--merge-fan-in\",    \"${{ inputs.merge_fan_in }}\",
                      \"--aws-region\",      \"${{ env.AWS_REGION }}\",
                      \"--temp-dir\",        \"/tmp/sort-work\"
                    ]
                  }]
                }" 2>&1)

              ARN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tasks'][0]['taskArn'] if d.get('tasks') else 'None')" 2>/dev/null || echo "None")

              if [ "$ARN" != "None" ] && [ -n "$ARN" ]; then
                break
              fi

              echo "  attempt $attempt failed. Failures:"
              echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); [print('   ',f) for f in d.get('failures',[])]" 2>/dev/null || echo "$RESPONSE"

              if [ "$attempt" -lt 3 ]; then
                echo "  Retrying in 10s..."
                sleep 10
              fi
            done

            if [ "$ARN" = "None" ] || [ -z "$ARN" ]; then
              echo "ERROR: Failed to launch map worker $i after 3 attempts"
              exit 1
            fi

            echo "  worker $i → $ARN"
            ARNS="$ARNS $ARN"
            sleep 2
          done

          echo "task_arns=$ARNS" >> $GITHUB_OUTPUT

      # ── Wait for all map workers to finish ───────────────────────────────
      - name: Wait for map workers
        run: |
          MAX_WAIT_SECS=10800
          POLL_INTERVAL=30

          for ARN in ${{ steps.launch-maps.outputs.task_arns }}; do
            echo "Waiting for $ARN ..."
            ELAPSED=0
            while true; do
              STATUS=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks "$ARN" \
                --query 'tasks[0].lastStatus' --output text)
              echo "  [${ELAPSED}s] $STATUS"
              [ "$STATUS" = "STOPPED" ] && break
              [ "$ELAPSED" -ge "$MAX_WAIT_SECS" ] && echo "Timeout!" && exit 1
              sleep $POLL_INTERVAL; ELAPSED=$((ELAPSED + POLL_INTERVAL))
            done
            EXIT_CODE=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks "$ARN" \
              --query 'tasks[0].containers[0].exitCode' --output text)
            echo "  exit code: $EXIT_CODE"
            if [ "$EXIT_CODE" != "0" ]; then
              echo "Map worker FAILED: $ARN (exit $EXIT_CODE)"
              TASK_ID=$(echo "$ARN" | awk -F/ '{print $NF}')
              echo "--- CloudWatch logs for failed worker ($TASK_ID) ---"
              aws logs get-log-events \
                --log-group-name /ecs/large-file-sorter \
                --log-stream-name "dist/${{ env.CONTAINER_NAME }}/$TASK_ID" \
                --query 'events[*].message' \
                --output text 2>/dev/null || echo "(logs not available)"
              exit 1
            fi
          done
          echo "All map workers completed successfully."

      # ── Launch reduce worker ─────────────────────────────────────────────
      - name: Launch reduce worker
        id: launch-reduce
        run: |
          ARN=""
          for attempt in 1 2 3; do
            RESPONSE=$(aws ecs run-task \
              --cluster ${{ env.ECS_CLUSTER }} \
              --task-definition ${{ steps.register-reduce-task.outputs.task_def_arn }} \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_ID }}],securityGroups=[${{ secrets.SECURITY_GROUP_ID }}],assignPublicIp=ENABLED}" \
              --overrides "{
                \"containerOverrides\": [{
                  \"name\": \"${{ env.CONTAINER_NAME }}\",
                  \"command\": [
                    \"--mode\",            \"reduce\",
                    \"--s3-bucket\",       \"${{ env.S3_BUCKET }}\",
                    \"--s3-parts-prefix\", \"${{ steps.run-prefix.outputs.parts_prefix }}\",
                    \"--s3-output-key\",   \"${{ steps.run-prefix.outputs.output_key }}\",
                    \"--worker-count\",    \"${{ inputs.worker_count }}\",
                    \"--merge-fan-in\",    \"${{ inputs.merge_fan_in }}\",
                    \"--aws-region\",      \"${{ env.AWS_REGION }}\",
                    \"--temp-dir\",        \"/tmp/sort-work\"
                  ]
                }]
              }" 2>&1)

            ARN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tasks'][0]['taskArn'] if d.get('tasks') else 'None')" 2>/dev/null || echo "None")

            if [ "$ARN" != "None" ] && [ -n "$ARN" ]; then
              break
            fi

            echo "attempt $attempt failed:"
            echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(' ',f) for f in d.get('failures',[])]" 2>/dev/null || echo "$RESPONSE"
            [ "$attempt" -lt 3 ] && sleep 10
          done

          if [ "$ARN" = "None" ] || [ -z "$ARN" ]; then
            echo "ERROR: Failed to launch reduce worker after 3 attempts"
            exit 1
          fi

          echo "task_arn=$ARN" >> $GITHUB_OUTPUT
          echo "Reduce task: $ARN"

      # ── Wait for reduce worker ───────────────────────────────────────────
      - name: Wait for reduce worker
        run: |
          ARN="${{ steps.launch-reduce.outputs.task_arn }}"
          MAX_WAIT_SECS=10800
          POLL_INTERVAL=30
          ELAPSED=0
          while true; do
            STATUS=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks "$ARN" \
              --query 'tasks[0].lastStatus' --output text)
            echo "[${ELAPSED}s] $STATUS"
            [ "$STATUS" = "STOPPED" ] && break
            [ "$ELAPSED" -ge "$MAX_WAIT_SECS" ] && echo "Timeout!" && exit 1
            sleep $POLL_INTERVAL; ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          EXIT_CODE=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks "$ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Reduce exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Reduce worker FAILED (exit $EXIT_CODE)"
            TASK_ID=$(echo "$ARN" | awk -F/ '{print $NF}')
            echo "--- CloudWatch logs for reduce worker ($TASK_ID) ---"
            aws logs get-log-events \
              --log-group-name /ecs/large-file-sorter \
              --log-stream-name "dist/${{ env.CONTAINER_NAME }}/$TASK_ID" \
              --query 'events[*].message' \
              --output text 2>/dev/null || echo "(logs not available)"
            exit 1
          fi

      # ── Show results ──────────────────────────────────────────────────────
      - name: Show S3 results
        if: always()
        run: |
          RUN_ID="${{ steps.run-prefix.outputs.run_id }}"
          echo "=== Parts ==="
          aws s3 ls "s3://${{ env.S3_BUCKET }}/distributed/$RUN_ID/parts/" --human-readable 2>/dev/null || echo "(none)"
          echo ""
          echo "=== Output ==="
          OUTPUT_KEY="${{ steps.run-prefix.outputs.output_key }}"
          aws s3 ls "s3://${{ env.S3_BUCKET }}/$OUTPUT_KEY" --human-readable 2>/dev/null || echo "(not found)"
          echo ""
          if aws s3 ls "s3://${{ env.S3_BUCKET }}/$OUTPUT_KEY" > /dev/null 2>&1; then
            echo "=== First 5 lines ==="
            aws s3 cp "s3://${{ env.S3_BUCKET }}/$OUTPUT_KEY" - 2>/dev/null | head -5
            echo "=== Last 5 lines ==="
            aws s3 cp "s3://${{ env.S3_BUCKET }}/$OUTPUT_KEY" - 2>/dev/null | tail -5
          fi

